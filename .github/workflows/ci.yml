name: CI

# The quality gate for every change. Render auto-deploys `main` on push and does
# NOT wait for GitHub checks, so branch protection requiring this `ci` check is
# what actually keeps a red build off the live site — once it's on, code can only
# reach `main` through a branch whose CI is green. One job so the required-check
# name stays stable ("ci"). The suite runs keyless by design — no secrets needed.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      # E05: the server-test tier boots the standalone build against a real
      # Postgres (structured data has no filesystem fallback anymore). This is
      # the ephemeral service container below — still keyless, no secrets.
      TEST_DATABASE_URL: postgres://postgres:ci@127.0.0.1:5432/postgres
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 } # full history: the frozen-manifest check diffs against the PR base
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run lint:boundaries
      - run: node scripts/check-frozen.mjs
      # Raw control bytes make `file` classify a source file as binary, which
      # makes grep skip it silently — so every grep-based guard here, and every
      # hand-run sweep, goes blind to it and says nothing. Twice now that has
      # hidden a live file from review. Cheap, full-tree, no deps.
      - run: node scripts/check-control-bytes.mjs
      - run: npm run test
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:server

      # E15 slice 5 — Lighthouse mobile performance budget (NFR-1 / M-18-02:
      # LCP < 2.5s on throttled 4G). Runs in THIS job to reuse the build and
      # the Postgres service container above rather than paying for a second
      # build. Measures a local production build, never the live site: a gate
      # that measured production would fail on someone else's traffic spike
      # and block a PR for a reason its author cannot act on.
      - name: Assemble the standalone bundle (what the Docker runner ships)
        run: |
          cp -r public .next/standalone/
          mkdir -p .next/standalone/.next && cp -r .next/static .next/standalone/.next/
          mkdir -p .next/standalone/db && cp -r db/migrations .next/standalone/db/
      - name: Lighthouse budgets
        env:
          # The standalone server needs a real database — the pages being
          # measured read from it. Reuses the service container; the boot
          # migrator creates the schema on first start.
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
          AUTH_SECRET: ci-lighthouse-secret-0123456789abcdef
          PORT: "3000"
        run: npx lhci autorun
