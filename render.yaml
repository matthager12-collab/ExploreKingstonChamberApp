# Render Blueprint for "Explore Kingston".
# Docs: https://render.com/docs/blueprint-spec
#
# Deploy: push this repo to GitHub, then in Render create a new Blueprint
# instance pointed at it. Render builds the Dockerfile and wires the env vars
# below (there is no disk to attach — see E15 slice 3 note further down). Set
# the sync:false secrets in the dashboard on the first deploy (they are
# intentionally NOT stored in git).
#
# This Blueprint is LIVE-SYNCED: autoSync is on and tracks `main`. Changing
# `plan` or a managed env var in the Render dashboard is therefore TEMPORARY —
# the next sync reverts it to whatever this file says. Change it HERE.
services:
  - type: web
    name: explore-kingston
    runtime: docker # build from Dockerfile rather than a native buildpack
    branch: main # explicit — Blueprint sync must never silently retarget this
    dockerfilePath: ./Dockerfile
    # standard = 2 GB / 1 CPU. Was `starter` (512 MB) until 2026-07-22, when
    # the service was oomKilled 9 times in ~22 hours — Render's own events
    # report `oomKilled {memoryLimit: "512Mi"}`, and because this service runs
    # ONE instance behind healthCheckPath, every kill 502s the WHOLE site for
    # 20-40s, not just the page being loaded. Idle baseline alone sits at
    # 90-175 MB depending on the boot, so 512 MB left almost no burst headroom
    # for Next 16 + React 19 + sharp (which allocates NATIVE memory outside the
    # V8 heap and is therefore invisible to V8's own GC pressure heuristics).
    #
    # Ratchet rule: if this ever needs `pro`, find the allocation first. The
    # 2026-07-22 kills were never traced to a specific call site — the process
    # was SIGKILLed by the cgroup with no V8 stack trace, which is exactly what
    # NODE_OPTIONS below now prevents. Do not buy headroom twice in a row.
    plan: standard
    region: oregon # closest Render region to Kingston, WA; change if desired
    # Render polls this path and only routes traffic once it returns 200.
    # Since E15 slice 3 (disk removed) /api/health gates on POSTGRES ONLY — it
    # returns 503 when DATABASE_URL is unreachable and never touches the
    # filesystem. See src/app/api/health/route.ts for why storage must not gate.
    healthCheckPath: /api/health

    # NO PERSISTENT DISK (E15 slice 3). Everything durable lives off-box:
    # structured state in Neon Postgres (E05) and uploaded images in the
    # private Cloudflare R2 bucket (E15 slice 1, R2_IMAGES_* below).
    #
    # The disk was the last single-box coupling and the reason every deploy was
    # an outage: Render must stop the old instance to detach the volume before
    # the new one can attach it, so releases could never overlap. Without it
    # deploys are zero-downtime.
    #
    # Do NOT reintroduce a disk to "just cache something" — it silently
    # restores that stop-start deploy window for the whole service.

    envVars:
      # Cap V8's old space BELOW the container limit (1536 MB inside the 2 GB
      # `standard` instance), leaving ~512 MB for native allocations —
      # sharp/libvips, Buffers, pg — which live OUTSIDE the JS heap but still
      # count against the cgroup.
      #
      # This is as much a DIAGNOSTIC as a limit. Node does not size its heap
      # from the cgroup limit, so without this V8 keeps growing until the kernel
      # SIGKILLs the process — silently. Every one of the 2026-07-22 kills left
      # NO stack trace anywhere in the logs, which is why the allocation was
      # never identified. With a ceiling, V8 hits ITS limit first and dies loudly
      # with "FATAL ERROR: ... JavaScript heap out of memory" naming the call
      # stack. If this service OOMs again, that trace is the thing to read.
      #
      # KEEP IN SYNC WITH `plan` ABOVE: this must stay ~75% of the instance's
      # RAM. Raising the plan without raising this wastes the new headroom;
      # lowering the plan without lowering this re-arms the silent-kill bug.
      - key: NODE_OPTIONS
        value: --max-old-space-size=1536

      # Session-signing secret for lib/auth.ts. Render generates a strong random
      # value once and keeps it stable across deploys (do not rotate casually —
      # rotating invalidates all existing sessions).
      - key: AUTH_SECRET
        generateValue: true

      # Free WSDOT access code for live Edmonds–Kingston ferry data (lib/wsf.ts).
      # Without it the app serves the bundled fallback schedule. Set in dashboard.
      - key: WSDOT_API_KEY
        sync: false

      # Absolute production origin for share-card/canonical URLs
      # (src/app/layout.tsx metadataBase). NEXT_PUBLIC_* = BUILD-time inlined —
      # changing the value requires a rebuild, not just a restart.
      - key: NEXT_PUBLIC_SITE_URL
        sync: false

      # E05 Postgres substrate: structured data lives in Neon. Value is set
      # ONLY in the dashboard (production at cutover, staging for rehearsal) —
      # never in this file. A release started without it fails /api/health
      # (dbOk:false) and 503s. NOTE: this does NOT keep the previous release
      # serving. Both services mount a persistent disk, and a disk can be
      # mounted by only ONE instance — so Render must stop the old instance
      # before starting the new one. A release that never goes healthy takes
      # the service DOWN. Verified on staging 2026-07-19: pushing the E06
      # release to a service with no DATABASE_URL produced 502 on every path.
      # Validate the URL from your laptop BEFORE pasting it here.
      - key: DATABASE_URL
        sync: false

      # Gates POST /api/auth/setup (first-run admin bootstrap) fail-closed.
      # Render generates a random value on first deploy; the operator reads it
      # from the dashboard to complete setup once. Deploys that already have an
      # admin never consult this var (hasAnyUsers() is checked first).
      - key: SETUP_TOKEN
        generateValue: true

      # Server-side Sentry error monitoring (src/instrumentation.ts). No-op
      # when unset. Never NEXT_PUBLIC_ — server-only, PII off.
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production

      # E15: the PRIVATE Cloudflare R2 bucket holding every uploaded image
      # (hunt reference photos + player submissions, map-feature images, event
      # attachments). All four must be set or hasR2() reads as unconfigured.
      # The bucket is private; the app proxies reads through its own image
      # routes. Nothing is served from r2.dev and no R2 custom domain is used
      # (that needs the DNS zone on Cloudflare, which is rejected).
      # Distinct from the backup job's R2_* GitHub secrets, which point at the
      # separate encrypted-backup bucket — do not cross-wire them.
      - key: R2_IMAGES_ENDPOINT
        sync: false
      - key: R2_IMAGES_BUCKET
        sync: false
      - key: R2_IMAGES_ACCESS_KEY_ID
        sync: false
      - key: R2_IMAGES_SECRET_ACCESS_KEY
        sync: false

      # Read-only, single-purpose token for the scheduled off-site backup
      # workflow (.github/workflows/backup-offsite.yml) to call
      # GET /api/admin/backup without an admin session.
      - key: BACKUP_TOKEN
        sync: false

      # Shared secret the ferry-observe/ferry-accuracy GitHub Actions crons
      # send as a Bearer token. Optional — those routes are open (throttled)
      # when unset.
      - key: FERRY_OBSERVE_TOKEN
        sync: false

      # Bearer token for the E08 staleness-sweep cron to call
      # POST /api/admin/worklist/sweep without an admin session. FAIL-CLOSED:
      # unset just disables the token path (the sweep still works from an
      # admin session) — unlike FERRY_OBSERVE_TOKEN it never opens the route.
      - key: WORKLIST_SWEEP_TOKEN
        sync: false

      # E11: lets the privacy-retention workflow POST
      # /api/admin/privacy/retention without an admin session (fail-closed).
      - key: RETENTION_TOKEN
        sync: false

      # Geo-IP: NO env var. The DB-IP City Lite database (CC-BY-4.0) is baked
      # into the image at build time and located via GEOIP_DB_PATH, set in the
      # Dockerfile — no MaxMind license key, no edition toggle. See
      # src/lib/geoip.ts and docs/runbooks/GEOIP.md. (Replaced MAXMIND_LICENSE_KEY
      # + GEOIP_EDITION on 2026-07-22.)

      # Bearer token for the E12 events-ingest cron (below) to call
      # POST /api/events/ingest. FAIL-CLOSED like WORKLIST_SWEEP_TOKEN: unset
      # disables the token path (ingest still runs from an admin session /
      # the admin "Sync now" button); production token callers get a 503.
      # Rotation: docs/OPERATIONS.md §12.
      - key: EVENTS_INGEST_TOKEN
        sync: false

      # Staff-generated GrowthZone whole-calendar iCal feed URL (E12 delta 2;
      # docs/OPERATIONS.md §9 item 6b). Optional — while unset the ams-ical
      # adapter scrapes per-event .ics files instead. TRANSITIONAL: the whole
      # GrowthZone source ends at the R3 freeze (~April 2027, ADR-0005).
      - key: AMS_CALENDAR_FEED_URL
        sync: false

  # E12 hourly events ingest — the FIRST Render cron in this blueprint (the
  # binding v2 decision: crons live on Render; the two legacy ferry crons in
  # .github/workflows/ stay put until E25 migrates them). Prebuilt curl image:
  # the job only POSTs the token-gated ingest endpoint on the web service
  # above — the app itself does the work. Runs regardless of the
  # unified-calendar flag (data flows dark; render paths are flag-gated).
  - type: cron
    name: events-ingest
    runtime: image
    image:
      url: docker.io/curlimages/curl:8.10.1
    schedule: "23 * * * *" # hourly, off the hour to be polite to the sources
    region: oregon
    dockerCommand: >-
      curl --fail --silent --show-error --max-time 600 -X POST
      -H "Authorization: Bearer $EVENTS_INGEST_TOKEN"
      https://explore-kingston.onrender.com/api/events/ingest
    envVars:
      # Same value as the web service's EVENTS_INGEST_TOKEN (set both in the
      # dashboard; sync:false keeps it out of git).
      - key: EVENTS_INGEST_TOKEN
        sync: false

  # ── App crons: moved off GitHub Actions in E15 slice 4 ────────────────────
  #
  # WHY THEY MOVED: GitHub disables scheduled workflows after 60 days with no
  # repo commits. For an app maintained by one part-time person, a quiet
  # stretch silently stops the ferry data collection that the busyness
  # forecast learns from — and nothing announces it. Render crons have no such
  # rule.
  #
  # SHAPE: a prebuilt curl image, not this repo's Docker image. Rebuilding the
  # whole app just to issue one HTTP request would make every cron a several-
  # minute build. The command lives inline here rather than in a script file
  # because `runtime: image` mounts no repo — and the blueprint is in git, so
  # it is just as reviewable.
  #
  # Each token must ALSO be set on the web service; the request is authorised
  # by src/proxy.ts's MACHINE_TOKEN_ROUTES table, which maps the exact path to
  # the env var holding its token. A cron hitting an /api/admin route that is
  # missing from that table 404s no matter how good the token is — that is the
  # bug that silently broke nightly backups once.

  - type: cron
    name: ferry-observe
    runtime: image
    image:
      url: docker.io/curlimages/curl:8.10.1
    schedule: "*/15 * * * *" # every 15 min (UTC)
    region: oregon
    # The endpoint dedupes server-side over ~10 min, so an overlapping or
    # double firing is harmless — which is what made the Actions→Render
    # handover safe to do with both running briefly.
    dockerCommand: >-
      curl --fail --silent --show-error --max-time 30
      --retry 3 --retry-delay 10 --retry-all-errors -X POST
      -H "Authorization: Bearer $FERRY_OBSERVE_TOKEN"
      https://explore-kingston.onrender.com/api/ferry/observe
    envVars:
      - key: FERRY_OBSERVE_TOKEN
        sync: false

  - type: cron
    name: ferry-accuracy
    runtime: image
    image:
      url: docker.io/curlimages/curl:8.10.1
    schedule: "0 8 * * *" # 08:00 UTC daily (~1 AM Pacific), after the day's data is in
    region: oregon
    dockerCommand: >-
      curl --fail --silent --show-error --max-time 60
      --retry 3 --retry-delay 10 --retry-all-errors -X POST
      -H "Authorization: Bearer $FERRY_OBSERVE_TOKEN"
      https://explore-kingston.onrender.com/api/ferry/accuracy
    envVars:
      - key: FERRY_OBSERVE_TOKEN
        sync: false

  - type: cron
    name: worklist-sweep
    runtime: image
    image:
      url: docker.io/curlimages/curl:8.10.1
    schedule: "0 14 * * 1" # Mondays 14:00 UTC (~7 AM Pacific) — E08 staleness sweep
    region: oregon
    dockerCommand: >-
      curl --fail --silent --show-error --max-time 30
      --retry 3 --retry-delay 10 --retry-all-errors -X POST
      -H "Authorization: Bearer $WORKLIST_SWEEP_TOKEN"
      https://explore-kingston.onrender.com/api/admin/worklist/sweep
    envVars:
      - key: WORKLIST_SWEEP_TOKEN
        sync: false

  # NOT MOVED, deliberately:
  #  - backup-offsite (.github/workflows/backup-offsite.yml) stays on Actions.
  #    It installs `age` and encrypts the bundle ON THE RUNNER before anything
  #    is stored. Moving it here would mean putting the backup keypair inside
  #    the app's own image — the one thing a backup must survive.
  #  - privacy-retention has NO schedule at all: it is workflow_dispatch-only
  #    and SHIPS DARK by design (E11). Because its APPLY flag is
  #    `inputs.apply || event_name == schedule`, giving it any schedule makes
  #    it start really deleting. Enabling the purge is an owner decision, not
  #    a cron migration.

  # Staging target for risky changes (E03). Builds the SAME Dockerfile/image
  # as production; deploy to it with `git push origin <branch>:staging`. It
  # holds no persistent state of its own (E15 removed the disks) — no
  # production PII ever lands here by default (do not restore a production
  # backup onto it). NOINDEX=1 keeps it out of search engines
  # (src/app/robots.ts), which also suppresses its sitemap directive.
  - type: web
    name: explore-kingston-staging
    runtime: docker
    branch: staging
    dockerfilePath: ./Dockerfile
    plan: starter # persistent disks require a paid instance type (not free)
    region: oregon
    healthCheckPath: /api/health

    # No persistent disk — see the note on the production service above.

    envVars:
      - key: AUTH_SECRET
        generateValue: true
      - key: WSDOT_API_KEY
        sync: false
      # Own origin for share-card/canonical URLs — set to this service's
      # onrender.com URL in the dashboard once it's provisioned.
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      # E05 Postgres substrate: structured data lives in Neon. Value is set
      # ONLY in the dashboard (production at cutover, staging for rehearsal) —
      # never in this file. A release started without it fails /api/health
      # (dbOk:false) and 503s. NOTE: this does NOT keep the previous release
      # serving. Both services mount a persistent disk, and a disk can be
      # mounted by only ONE instance — so Render must stop the old instance
      # before starting the new one. A release that never goes healthy takes
      # the service DOWN. Verified on staging 2026-07-19: pushing the E06
      # release to a service with no DATABASE_URL produced 502 on every path.
      # Validate the URL from your laptop BEFORE pasting it here.
      - key: DATABASE_URL
        sync: false
      # Fresh disk on first deploy has zero users — this bootstraps the
      # staging admin account (same mechanism as production).
      - key: SETUP_TOKEN
        generateValue: true
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: staging
      # E15: point staging at a SCRATCH bucket, never the production one — the
      # migration is rehearsed here first and a mis-set value would write test
      # images into the live bucket.
      - key: R2_IMAGES_ENDPOINT
        sync: false
      - key: R2_IMAGES_BUCKET
        sync: false
      - key: R2_IMAGES_ACCESS_KEY_ID
        sync: false
      - key: R2_IMAGES_SECRET_ACCESS_KEY
        sync: false
      - key: BACKUP_TOKEN
        sync: false
      - key: FERRY_OBSERVE_TOKEN
        sync: false
      - key: WORKLIST_SWEEP_TOKEN
        sync: false
      - key: RETENTION_TOKEN
        sync: false
      # Geo-IP: none — the DB-IP database is baked into the image (GEOIP_DB_PATH
      # set in the Dockerfile), so staging mirrors prod with no env var.
      # E12 events ingest (staging has no cron; admin "Sync now" / manual curl).
      - key: EVENTS_INGEST_TOKEN
        sync: false
      - key: AMS_CALENDAR_FEED_URL
        sync: false
      # Makes /robots.txt disallow everything (src/app/robots.ts). Plain
      # runtime value, not NEXT_PUBLIC_ — both services ship the same image
      # and branch on this at request time.
      - key: NOINDEX
        value: "1"
